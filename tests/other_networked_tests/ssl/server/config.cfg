###########################################################
# LLFIX SINGLETON ENGINE
[ENGINE]
log_level=DEBUG
log_file=log.txt

###########################################################
# FIXSERVER INSTANCE
[EXAMPLE_SERVER]
accept_port=5001
send_try_count=1024
#SSL
use_ssl=true
ssl_verify_peer=false
ssl_version=TLS12
ssl_certificate_pem_file=../ssl_test_files/quickfixn/server_cert.pem
ssl_private_key_pem_file=../ssl_test_files/quickfixn/server_key.pem
ssl_private_key_password=QuickFixn-TestServer
ssl_ca_pem_file=../ssl_test_files/quickfixn/ca.pem
#ssl_cipher_suite=ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256
#ssl_crl_path=../ssl_test_files/crl_path/
#ssl_certificate_pem_file=../ssl_test_files/server.crt
#ssl_private_key_pem_file=../ssl_test_files/server.key
#ssl_ca_pem_file=../ssl_test_files/ca.crt

###########################################################
# SESSIONS
[SESSION1]
begin_string=FIX.4.4
sender_comp_id=EXECUTOR
target_comp_id=CLIENT1
heartbeat_interval_seconds=10
throttle_window_in_milliseconds=1000
throttle_limit=1000
throttle_action=WAIT
sequence_store_file_path=clients/client1/sequence.store
incoming_message_serialisation_path=clients/client1/messages_incoming
outgoing_message_serialisation_path=clients/client1/messages_outgoing

[SESSION2]
begin_string=FIX.4.4
sender_comp_id=EXECUTOR
target_comp_id=CLIENT2
heartbeat_interval_seconds=10
throttle_window_in_milliseconds=1000
throttle_limit=1000
throttle_action=WAIT
sequence_store_file_path=clients/client2/sequence.store
incoming_message_serialisation_path=clients/client2/messages_incoming
outgoing_message_serialisation_path=clients/client2/messages_outgoing