[ENGINE]
log_level=DEBUG
log_file=log.txt

###########################################################
# FIXCLIENT INSTANCE
[EXAMPLE_CLIENT]
primary_address=127.0.0.1
primary_port=5001
secondary_address=127.0.0.1
secondary_port=5001
send_try_count=1024
#nic_address=YOUR_NIC_IP
#nic_name=YOUR_NIC_NAME
#SSL
use_ssl=true
ssl_verify_peer=false
ssl_version=TLS12
ssl_certificate_pem_file=../ssl_test_files/quickfixn/client_cert.pem
ssl_private_key_pem_file=../ssl_test_files/quickfixn/client_key.pem
ssl_private_key_password=QuickFixn-TestClient
ssl_ca_pem_file=../ssl_test_files/quickfixn/ca.pem
#ssl_cipher_suite=ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256
#ssl_certificate_pem_file=../ssl_test_files/client.crt
#ssl_private_key_pem_file=../ssl_test_files/client.key
#ssl_ca_pem_file=../ssl_test_files/ca.crt

###########################################################
# FIXCLIENT SESSION
[EXAMPLE_SESSION]
begin_string=FIX.4.4
sender_comp_id=CLIENT1
target_comp_id=EXECUTOR
heartbeat_interval_seconds=5
throttle_window_in_milliseconds=1000
throttle_limit=100
sequence_store_file_path=sequence.store
incoming_message_serialisation_path=messages_incoming
outgoing_message_serialisation_path=messages_outgoing