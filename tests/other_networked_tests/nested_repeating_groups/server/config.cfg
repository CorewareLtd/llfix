###########################################################
# LLFIX SINGLETON ENGINE
[ENGINE]
log_level=DEBUG
log_file=log.txt

###########################################################
# FIXSERVER INSTANCE
[EXAMPLE_SERVER]
accept_port=5001
send_try_count=1024

###########################################################
# SESSIONS
[SESSION1]
application_dictionary_path=../../../dictionaries/FIX50SP2.xml
transport_dictionary_path=../../../dictionaries/FIXT11.xml
begin_string=FIXT.1.1
default_app_ver_id=7
sender_comp_id=EXECUTOR
target_comp_id=CLIENT1
heartbeat_interval_seconds=10
throttle_window_in_milliseconds=1000
throttle_limit=1000
throttle_action=WAIT
sequence_store_file_path=clients/client1/sequence.store
incoming_message_serialisation_path=clients/client1/messages_incoming
outgoing_message_serialisation_path=clients/client1/messages_outgoing

[SESSION2]
application_dictionary_path=../../../dictionaries/FIX50SP2.xml
transport_dictionary_path=../../../dictionaries/FIXT11.xml
begin_string=FIXT.1.1
default_app_ver_id=7
sender_comp_id=EXECUTOR
target_comp_id=CLIENT2
heartbeat_interval_seconds=10
throttle_window_in_milliseconds=1000
throttle_limit=1000
throttle_action=WAIT
sequence_store_file_path=clients/client2/sequence.store
incoming_message_serialisation_path=clients/client2/messages_incoming
outgoing_message_serialisation_path=clients/client2/messages_outgoing