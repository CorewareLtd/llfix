###########################################################
# LLFIX SINGLETON ENGINE
[ENGINE]
log_level=DEBUG
log_file=log.txt
management_server_port=42
management_server_nic_ip=127.0.0.1

###########################################################
# FIXSERVER INSTANCE
[EXAMPLE_SERVER]
cpu_core_id=2
accept_port=5001

###########################################################
# SESSIONS
[SESSION1]
begin_string=FIXT.1.1
default_app_ver_id=7
sender_comp_id=EXECUTOR
target_comp_id=CLIENT1
heartbeat_interval_seconds=10
throttle_window_in_milliseconds=1000
throttle_limit=1000
throttle_action=WAIT
sequence_store_file_path=clients/client1/sequence.store
incoming_message_serialisation_path=clients/client1/messages_incoming
outgoing_message_serialisation_path=clients/client1/messages_outgoing

