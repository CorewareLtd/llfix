[HA_SYNCER]
###############################################################
# ROLE
initially_supporting_primary_instance=true
###############################################################
# LOGS
log_file=log_syncer_primary.txt
log_level=DEBUG
log_queries=false
log_message_syncs=false
###############################################################
# SENDER SETTINGS
sender_nic_ip=127.0.0.1
#sender_nic_ip=192.168.10.103
sender_port=444
###############################################################
# RECEIVER SETTINGS
receiver_nic_ip=127.0.0.1
receiver_target_ip=127.0.0.1
#receiver_nic_ip=192.168.10.103
#receiver_target_ip=192.168.10.100
receiver_target_port=555
sync_query_interval_microseconds=100000
###############################################################
# MESSAGE SYNCS
sync_outgoing_messages=true
sync_incoming_messages=true
max_request_message_count_per_query_response=100
###############################################################
# PARENT INSTANCE ADMIN CLIENT SETTINGS
parent_instance_name=TEST_SERVER
parent_instance_admin_ip=127.0.0.1
#parent_instance_admin_ip=192.168.10.103
parent_instance_admin_port=42
#parent_instance_admin_client_nic_ip=192.168.10.103
parent_instance_admin_client_nic_ip=127.0.0.1
parent_instance_admin_client_query_interval_milliseconds=1000

[SESSION_ONE]
sequence_store_file_path=./server1/clients/client1/sequence.store
max_serialised_file_size=67108864
incoming_message_serialisation_path=./server1/clients/client1/messages_incoming
outgoing_message_serialisation_path=./server1/clients/client1/messages_outgoing

