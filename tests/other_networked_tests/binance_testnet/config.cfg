[ENGINE]
log_level=DEBUG
log_file=log.txt

###########################################################
# FIXCLIENT INSTANCE
[EXAMPLE_CLIENT]
primary_address=fix-oe.testnet.binance.vision
primary_port=9000
secondary_address=fix-oe.testnet.binance.vision
secondary_port=9001
#nic_address=YOUR_NIC_IP
#nic_name=YOUR_NIC_NAME
#SSL
use_ssl=true
ssl_verify_peer=true
ssl_version=TLS12
ssl_ca_pem_file=ca-certificates.crt

###########################################################
# FIXCLIENT SESSION
[EXAMPLE_SESSION]
begin_string=FIX.4.4
application_dictionary_path=./binance-spot-fix-oe.xml
logon_username=PLACE_YOUR_API_KEY_HERE
sender_comp_id=LLFIX
target_comp_id=SPOT
logon_reset_sequence_numbers=true
heartbeat_interval_seconds=30
timestamp_subseconds_precision=MILLI
throttle_window_in_milliseconds=1000
throttle_limit=100
sequence_store_file_path=sequence.store
incoming_message_serialisation_path=messages_incoming
outgoing_message_serialisation_path=messages_outgoing
