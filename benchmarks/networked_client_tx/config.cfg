###########################################################
# LLFIX SINGLETON ENGINE
[ENGINE]
log_level=ERROR

###########################################################
# FIXCLIENT INSTANCE
[EXAMPLE_CLIENT]
# CHANGE ACCORDINGLY
primary_address=192.168.10.100
primary_port=5001
# CHANGE ACCORDINGLY
nic_address=192.168.10.103
# CHANGE ACCORDINGLY
nic_name=ens3f0

###########################################################
# FIXCLIENT SESSION
[EXAMPLE_SESSION]
begin_string=FIXT.1.1
default_app_ver_id=7
sender_comp_id=CLIENT1
target_comp_id=EXECUTOR
timestamp_subseconds_precision=MILLI
#SIMD AVX2
enable_simd_avx2=true
# LARGE ENOUGH SO DOESN'T GET IN THE WAY
heartbeat_interval_seconds=60
replay_messages_on_incoming_resend_request=false
# Sender and target sub id
additional_static_header_tags=50=SNDR_SUB,57=SRVR_SUB
# Disabled throttling
throttle_limit=0
# LARGE ENOUGH SO DOESN'T GET IN THE WAY DURING ROTATION, 640 MB
max_serialised_file_size=671088640